<!doctype html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Svobodné cechy – Knihovna médií</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css?v=202605020920" />
</head>

<body class="page">
    <header class="site-header">
        <a class="logo" href="index.html">
            <img src="LOGO_SC2.svg" alt="Svobodné cechy" />
        </a>
        <div class="user-menu">
            <button class="user-link" type="button" id="user-toggle" aria-expanded="false">Profil</button>
            <div class="user-dropdown" id="user-dropdown" hidden>
                <a href="profil.html">Profil</a>
                <a href="admin.html" class="admin-only">Administrace</a>
                <button type="button" id="user-logout" class="user-logout">Odhlásit</button>
            </div>
        </div>
        <button class="nav-toggle" type="button" aria-label="Menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <nav class="nav">
            <a href="index.html">Úvod</a>
            <a href="mistri.html">Mistři</a>
        </nav>
    </header>

    <main>
        <section class="admin-layout">
            <div class="form-card" id="admin-guard">
                <h2>Administrace</h2>
                <p class="lead" style="font-size: 14px;">Pro vstup se musíš přihlásit jako admin.</p>
                <a class="btn primary" href="login.html">Přejít na přihlášení</a>
            </div>

            <div class="form-card" id="media-admin" style="display:none;">
                <div class="row" style="align-items: center; margin-bottom: 20px;">
                    <h2>Knihovna médií</h2>
                    <div style="display:flex; gap: 8px;">
                        <button class="btn secondary" id="new-folder-btn"><i class="bi bi-folder-plus"></i>&nbsp; Nová
                            složka</button>
                        <label class="btn primary" style="cursor:pointer;">
                            <i class="bi bi-cloud-upload"></i>&nbsp; Nahrát soubor
                            <input type="file" id="media-upload-input" multiple hidden>
                        </label>
                    </div>
                </div>

                <nav class="breadcrumbs" id="media-breadcrumbs"
                    style="margin-bottom: 20px; font-size: 14px; color: var(--muted);">
                    <span data-folder-id="null" style="cursor:pointer; font-weight: bold;">Root</span>
                </nav>

                <div class="media-grid" id="media-grid"
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px;">
                    <!-- Content generated by JS -->
                </div>

                <div id="media-notice" class="notice" style="display:none; margin-top: 20px;"></div>
            </div>
        </section>
    </main>

    <!-- Modal for Folder Creation/Renaming -->
    <div class="modal-backdrop" id="folder-modal" hidden>
        <div class="modal-card">
            <h3 id="folder-modal-title">Nová složka</h3>
            <input type="text" id="folder-name-input" placeholder="Název složky" style="width: 100%; margin: 15px 0;" />
            <div class="modal-actions">
                <button class="btn ghost" id="folder-modal-cancel">Zrušit</button>
                <button class="btn primary" id="folder-modal-save">Uložit</button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="confirm-modal" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
            <h3 id="confirm-title">Potvrzení</h3>
            <p id="confirm-text"></p>
            <div class="modal-actions">
                <button class="btn ghost" type="button" id="confirm-cancel">Zrušit</button>
                <button class="btn primary" type="button" id="confirm-ok">Pokračovat</button>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <span>Svobodné cechy</span>
        <span>Učednictví pro generaci 12–18</span>
    </footer>

    <script src="app.js?v=202605020920"></script>
</body>

</html>
