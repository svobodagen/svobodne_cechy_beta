<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bez Školy – Detail Mistra (Plně funkční návrh)</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bungee&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  
  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --accent: #f5b932;
      --accent-gradient: linear-gradient(135deg, #f5b932 0%, #d49a1a 100%);
      --bg-black: #000000;
      --bg-light: #f7f7f7;
      --text-white: #ffffff;
      --text-dark: #1a1a1a;
      --text-muted: #71717a;
      --border: rgba(255, 255, 255, 0.1);
      --font-main: 'Plus Jakarta Sans', sans-serif;
      /* Layered shadows for depth */
      --shadow-premium: 
        0 2px 4px rgba(0,0,0,0.02),
        0 10px 20px rgba(0,0,0,0.04),
        0 20px 40px rgba(0,0,0,0.06),
        0 30px 60px rgba(0,0,0,0.08);
      --shadow-dark:
        0 10px 30px rgba(0,0,0,0.5),
        0 20px 60px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-black);
      color: var(--text-white);
      font-family: var(--font-main);
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* App Container */
    .app-viewport {
      max-width: 500px;
      margin: 0 auto;
      background: var(--bg-black);
      min-height: 100vh;
      position: relative;
      padding-bottom: 90px;
    }

    /* Header / Logo */
    .app-header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: absolute;
      top: 0; width: 100%; z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
      backdrop-filter: blur(4px);
    }
    .app-logo { text-align: center; flex-grow: 1; text-decoration: none; color: white; }
    .app-logo div { font-family: 'Bungee', cursive; font-size: 20px; line-height: 1; letter-spacing: 1px; }
    .app-logo span { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); font-weight: 700; }

    /* Hero Section */
    .hero {
      position: relative;
      height: 85vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 60px 24px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.95) 100%),
                  url('mystery_master.png') center/cover no-repeat;
      z-index: 1;
      transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hero-content { position: relative; z-index: 2; }

    .craft-tag {
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 12px;
      letter-spacing: 2px;
      display: inline-block;
      padding: 4px 0;
      border-bottom: 2px solid var(--accent);
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      line-height: 0.9;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: -1px;
    }

    .hero .quote {
      font-size: 18px;
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 35px;
      max-width: 95%;
      border-left: 4px solid;
      border-image: linear-gradient(to bottom, var(--accent), transparent) 1;
      padding-left: 20px;
      color: rgba(255,255,255,0.9);
    }

    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 10px;
      font-weight: 800;
      text-transform: uppercase;
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-bottom: 12px;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .btn.primary { 
      background: var(--accent-gradient); 
      color: #000; 
      box-shadow: 0 4px 15px rgba(245, 185, 50, 0.3);
    }
    .btn.outline { 
      background: rgba(255,255,255,0.05); 
      color: white; 
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(5px);
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: scale(0.96); }

    /* Stats Bar */
    .stats-bar {
      background: #fff;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      color: var(--text-dark);
      margin: 20px 24px 30px 24px;
      border-radius: 20px;
      box-shadow: var(--shadow-premium);
      position: relative;
      z-index: 15;
    }

    .stat-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .stat-icon {
      width: 40px; height: 40px;
      background: #f7f7f7;
      color: #000;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .stat-item strong { font-size: 14px; font-weight: 800; display: block; line-height: 1.2; color: var(--text-dark); }
    .stat-item span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }

    /* Audio Player */
    .audio-player-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin: 30px 0;
      width: 100%;
      position: relative;
      z-index: 20;
    }

    .player-main {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .play-button-wrapper {
      position: relative;
      width: 160px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-button {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #000;
      border: none;
      outline: none;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 28px;
      box-shadow: 0 0 20px rgba(245, 185, 50, 0.4);
    }

    .play-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(245, 185, 50, 0.6);
    }

    .progress-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-90deg);
      pointer-events: none;
      z-index: 11;
    }

    .progress-ring__circle {
      transition: stroke-dashoffset 0.1s linear;
      stroke: #ffffff;
    }

    .visualizer-canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 160px;
      height: 50px;
      background: transparent;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    .audio-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-weight: 800;
    }

    /* Content Area */
    .content-area {
      background: white;
      color: var(--text-dark);
      padding: 40px 24px;
      border-radius: 30px 30px 0 0;
      margin-top: 0;
      position: relative;
      z-index: 10;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    }

    /* Accordion Improved */
    .accordion-item {
      background: white;
      border-radius: 16px;
      margin-bottom: 16px;
      border: 1px solid #f0f0f0;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-premium);
    }
    
    .accordion-item:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .accordion-trigger {
      width: 100%;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }

    .accordion-icon {
      width: 44px;
      height: 44px;
      background: #f7f7f7;
      color: #000;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .accordion-item.active .accordion-icon {
      background: var(--accent);
      color: #000;
      transform: rotate(10deg);
    }

    .accordion-title-box {
      flex-grow: 1;
    }

    .accordion-title {
      display: block;
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-dark);
      line-height: 1.2;
      letter-spacing: 0.5px;
    }

    .accordion-subtitle {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .accordion-caret {
      color: var(--text-muted);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 18px;
    }

    .accordion-item.active .accordion-caret {
      transform: rotate(180deg);
      color: var(--accent);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s ease, opacity 0.3s ease;
      padding: 0 20px;
      opacity: 0;
    }

    .accordion-item.active .accordion-content {
      max-height: 3000px;
      padding: 0 20px 30px 80px;
      opacity: 1;
    }

    /* Inverse (Dark) Accordion */
    .accordion-item.inverse {
      background: #000;
      border-color: #222;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .accordion-item.inverse .accordion-title { color: #fff; }
    .accordion-item.inverse .accordion-subtitle { color: var(--accent); opacity: 0.8; }
    .accordion-item.inverse .accordion-icon { background: var(--accent); color: #000; }
    .accordion-item.inverse .accordion-caret { color: #fff; }
    .accordion-item.inverse .form-group label { color: #aaa; }
    .accordion-item.inverse input, .accordion-item.inverse textarea {
      background: #111;
      border-color: #333;
      color: #fff;
      padding: 16px;
    }
    .accordion-item.inverse input:focus, .accordion-item.inverse textarea:focus {
      border-color: var(--accent);
      outline: none;
    }

    .description {
      font-size: 15px;
      line-height: 1.7;
      color: #444;
    }
    .description p { margin-bottom: 20px; }
    .description ul { padding-left: 20px; margin-bottom: 20px; }
    .description li { margin-bottom: 8px; list-style-type: none; position: relative; }
    .description li::before { content: "•"; color: var(--accent); font-weight: bold; position: absolute; left: -15px; }
    .description strong { color: #000; font-weight: 800; }

    /* Tags */
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }
    .tag {
      background: #f0f0f0;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dark);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tag.aura { background: var(--accent-gradient); color: #000; }

    /* Gallery */
    .gallery-container {
      margin: 30px -24px;
      position: relative;
    }
    .gallery-scroller {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 0 24px 30px 24px;
      scrollbar-width: none;
    }
    .gallery-scroller::-webkit-scrollbar { display: none; }
    
    .gallery-item {
      flex: 0 0 82%;
      aspect-ratio: 4/5;
      scroll-snap-align: center;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .gallery-item:active { transform: scale(0.95); }
    .gallery-item img, .gallery-item video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .gallery-index {
      position: absolute;
      top: 20px; right: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      z-index: 5;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Socials */
    .social-row {
      display: flex;
      justify-content: flex-start;
      gap: 24px;
      margin-bottom: 30px;
      font-size: 26px;
    }
    .social-row a { 
      color: var(--text-dark); 
      transition: all 0.3s ease; 
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px; height: 50px;
      background: #f7f7f7;
      border-radius: 50%;
    }
    .social-row a:hover { 
      color: #000; 
      background: var(--accent);
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(245, 185, 50, 0.4);
    }

    /* Tab Bar */
    .tab-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 500px;
      background: rgba(0,0,0,0.85); 
      backdrop-filter: blur(15px);
      padding: 15px 0 25px 0;
      display: flex; justify-content: space-around;
      border-top: 1px solid rgba(255,255,255,0.1); 
      z-index: 100;
      border-radius: 24px 24px 0 0;
    }

    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .tab-item.active { color: var(--accent); }
    .tab-item i { font-size: 22px; }

    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (min-width: 501px) {
      body { background: #0a0a0a; }
      .app-viewport { box-shadow: 0 0 100px rgba(0,0,0,0.8); }
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 9000;
      align-items: center;
      justify-content: center;
    }
    .lightbox-close {
      position: fixed;
      top: 20px; right: 24px;
      font-size: 36px;
      color: white;
      cursor: pointer;
      z-index: 9001;
      line-height: 1;
    }
    .lightbox-content {
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-content img, .lightbox-content video {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
    }

    /* Form fields */
    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }
    .form-group label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #aaa;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-family: var(--font-main);
      font-size: 15px;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,185,50,0.15);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Master Picker */
    #master-picker {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-black);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .picker-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 440px;
    }
    .picker-card h2 {
      font-family: 'Bungee', cursive;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .picker-card select {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      margin-bottom: 16px;
      font-family: var(--font-main);
    }

  </style>
</head>
<body>

  <div class="app-viewport">
    <header class="app-header">
      <a href="mistri.html" style="color: white; font-size: 24px;"><i class="bi bi-chevron-left"></i></a>
      <a href="index.html" class="app-logo">
        <div>BEZ ŠKOLY</div>
        <span>Uč se od mistrů</span>
      </a>
      <i class="bi bi-heart" style="font-size: 22px;"></i>
    </header>

    <div class="hero">
      <div class="hero-bg" id="hero-bg"></div>
      <div class="hero-content">
        <div class="craft-tag skeleton" id="master-craft" style="width: 120px; height: 20px; color: transparent;">NAČÍTÁM...</div>
        <h1 id="master-name" class="skeleton" style="width: 80%; height: 50px; color: transparent; margin-bottom: 20px;">...</h1>
        <div class="quote skeleton" id="master-quote" style="width: 90%; height: 60px; color: transparent;">"..."</div>
        
        <button class="btn primary" id="btn-contact-top">
          <i class="bi bi-send-fill"></i> KONTAKTOVAT MISTRA
        </button>
      </div>
    </div>

    <!-- Advanced Audio Player (Original logic adapted) -->
    <div id="audio-player-container" class="audio-player-container" style="display: none;">
      <div class="audio-label">Vzkaz od mistra</div>
      <div class="player-main">
        <div class="play-button-wrapper">
          <canvas class="visualizer-canvas" id="audio-visualizer"></canvas>
          <svg class="progress-ring" width="64" height="64" viewBox="0 0 64 64">
            <!-- Static yellow border (Original was orange #ff7b1c) -->
            <circle stroke="var(--accent)" stroke-width="2" fill="none" r="24" cx="32" cy="32" />
            <!-- White progress ring -->
            <circle class="progress-ring__circle" stroke-width="2" fill="transparent" r="28" cx="32" cy="32" 
              style="stroke-dasharray: 175.9; stroke-dashoffset: 175.9;" />
          </svg>
          <button class="play-button" id="btn-audio-play">
            <i class="bi bi-play-fill" style="margin-left: 3px;"></i>
          </button>
        </div>
      </div>
      <audio id="main-audio" hidden></audio>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-icon"><i class="bi bi-person"></i></div>
        <div class="stat-text">
          <strong id="stat-students">...</strong>
          <span>kapacita</span>
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-icon"><i class="bi bi-geo-alt"></i></div>
        <div class="stat-text">
          <strong id="stat-location">...</strong>
          <span>lokalita</span>
        </div>
      </div>
    </div>

    <div class="content-area">
      <div id="master-accordions">
        <!-- Příběh -->
        <div class="accordion-item" id="acc-story">
          <button class="accordion-trigger">
            <div class="accordion-icon"><i class="bi bi-person-badge"></i></div>
            <div class="accordion-title-box">
              <span class="accordion-title">Můj příběh</span>
              <span class="accordion-subtitle">Kdo jsem a co dělám</span>
            </div>
            <i class="bi bi-chevron-down accordion-caret"></i>
          </button>
          <div class="accordion-content">
            <div class="accordion-inner">
              <div class="description" id="master-desc"></div>
              <div class="social-row" id="master-socials" style="margin-top: 20px;"></div>
            </div>
          </div>
        </div>

        <!-- Požadavky -->
        <div class="accordion-item" id="acc-requirements" style="display: none;">
          <button class="accordion-trigger">
            <div class="accordion-icon"><i class="bi bi-check2-square"></i></div>
            <div class="accordion-title-box">
              <span class="accordion-title">Požadavky</span>
              <span class="accordion-subtitle">Co bys měl splňovat</span>
            </div>
            <i class="bi bi-chevron-down accordion-caret"></i>
          </button>
          <div class="accordion-content">
            <div class="accordion-inner">
              <div class="description" id="master-requirements"></div>
            </div>
          </div>
        </div>

        <!-- Motivace -->
        <div class="accordion-item" id="acc-motivation" style="display: none;">
          <button class="accordion-trigger">
            <div class="accordion-icon"><i class="bi bi-heart-fill"></i></div>
            <div class="accordion-title-box">
              <span class="accordion-title">Co nás motivuje učit</span>
              <span class="accordion-subtitle">Proč to děláme</span>
            </div>
            <i class="bi bi-chevron-down accordion-caret"></i>
          </button>
          <div class="accordion-content">
            <div class="accordion-inner">
              <div class="description" id="master-motivation"></div>
            </div>
          </div>
        </div>

        <!-- Ubytování -->
        <div class="accordion-item" id="acc-accommodation" style="display: none;">
          <button class="accordion-trigger">
            <div class="accordion-icon"><i class="bi bi-house-door"></i></div>
            <div class="accordion-title-box">
              <span class="accordion-title">Ubytování</span>
              <span class="accordion-subtitle">Kde budeš složit hlavu</span>
            </div>
            <i class="bi bi-chevron-down accordion-caret"></i>
          </button>
          <div class="accordion-content">
            <div class="accordion-inner">
              <div class="description" id="master-accommodation"></div>
            </div>
          </div>
        </div>

        <!-- Kompenzace -->
        <div class="accordion-item" id="acc-compensation" style="display: none;">
          <button class="accordion-trigger">
            <div class="accordion-icon"><i class="bi bi-cash-stack"></i></div>
            <div class="accordion-title-box">
              <span class="accordion-title">Formy kompenzace</span>
              <span class="accordion-subtitle">Jak si to vyrovnáme</span>
            </div>
            <i class="bi bi-chevron-down accordion-caret"></i>
          </button>
          <div class="accordion-content">
            <div class="accordion-inner">
              <div class="description" id="master-compensation"></div>
            </div>
          </div>
        </div>

        <!-- Doporučení -->
        <div class="accordion-item" id="acc-recommendations" style="display: none;">
          <button class="accordion-trigger">
            <div class="accordion-icon"><i class="bi bi-journal-text"></i></div>
            <div class="accordion-title-box">
              <span class="accordion-title">Doporučení</span>
              <span class="accordion-subtitle">Kam se dál rozvíjet</span>
            </div>
            <i class="bi bi-chevron-down accordion-caret"></i>
          </button>
          <div class="accordion-content">
            <div class="accordion-inner">
              <div class="description" id="master-recommendations"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Variant 1 Gallery Scroller -->
      <h2 class="section-header" style="margin-top: 40px; font-size: 20px;"><i class="bi bi-image" style="color:var(--accent);"></i> Ukázky práce</h2>
      <div class="gallery-container">
        <div class="gallery-scroller" id="gallery-scroller">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Napiš mistrovi (Inverted & Moved to end) -->
      <div class="accordion-item inverse" id="acc-contact" style="margin-top: 30px;">
        <button class="accordion-trigger">
          <div class="accordion-icon"><i class="bi bi-envelope"></i></div>
          <div class="accordion-title-box">
            <span class="accordion-title">Napiš mistrovi</span>
            <span class="accordion-subtitle">Pošli zprávu a poptej se</span>
          </div>
          <i class="bi bi-chevron-down accordion-caret"></i>
        </button>
        <div class="accordion-content">
          <div class="accordion-inner">
            <div class="form-section" id="contact-form-section" style="margin-top:0; border:none; background:none; padding:0; box-shadow:none;">
              <form id="message-form">
                <div class="form-group">
                  <label>Jméno</label>
                  <input type="text" id="msg-name" required />
                </div>
                <div class="form-group">
                  <label>Email</label>
                  <input type="email" id="msg-email" required />
                </div>
                <div class="form-group">
                  <label>Telefon</label>
                  <input type="tel" id="msg-phone" required />
                </div>
                <div class="form-group">
                  <label>Zpráva</label>
                  <textarea id="msg-text" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn primary">ODESLAT ZPRÁVU</button>
              </form>
              <div id="msg-notice" style="display:none; margin-top: 15px; text-align: center; font-weight: 700;"></div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <nav class="tab-bar">
      <a href="mistri.html" class="tab-item active"><i class="bi bi-people"></i><span>Mistři</span></a>
      <a href="najit-mistra.html" class="tab-item"><i class="bi bi-question-circle"></i><span>Poptat</span></a>
      <a href="profil.html" class="tab-item" id="tab-profil"><i class="bi bi-person-circle"></i><span>Profil</span></a>
      <a href="admin.html" class="tab-item" id="tab-admin"><i class="bi bi-shield-lock"></i><span>Admin</span></a>
    </nav>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightbox-close">&times;</div>
    <div class="lightbox-content" id="lightbox-content"></div>
  </div>

  <script src="app.js?v=202605040957"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      let id = params.get('id');

      // Helper for Master Picker
      async function showPicker() {
        const masters = await getMasters(false);
        const picker = document.createElement('div');
        picker.id = 'master-picker';
        picker.innerHTML = `
          <div class="picker-card">
            <h2>Vyberte mistra</h2>
            <p style="color:var(--text-muted); margin-bottom: 25px;">Zvolte mistra pro náhled nového designu:</p>
            <select id="picker-select">
              <option value="">-- Vyberte --</option>
              ${masters.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}
            </select>
            <button class="btn primary" id="picker-btn">ZOBRAZIT NÁVRH</button>
          </div>
        `;
        document.body.appendChild(picker);
        document.getElementById('picker-btn').onclick = () => {
          const sid = document.getElementById('picker-select').value;
          if (sid) window.location.href = `mistr-detail-new.html?id=${sid}`;
        };
      }

      if (!id) { await showPicker(); return; }

      const master = await getMaster(id);
      if (!master) { await showPicker(); return; }

      // --- POPULATE UI ---
      try {
        if (!master.name) { console.error("Master name missing"); return; }
        document.title = `Bez Školy – ${master.name}`;
        const nameEl = document.getElementById('master-name');
        if (nameEl) {
          nameEl.innerHTML = (master.name || '').split(' ').join('<br>');
          nameEl.classList.remove('skeleton');
          nameEl.style.width = ''; nameEl.style.height = ''; nameEl.style.color = '';
        }

        const craftEl = document.getElementById('master-craft');
        if (craftEl) {
          craftEl.textContent = (master.craft || 'Řemeslo').toUpperCase();
          craftEl.classList.remove('skeleton');
          craftEl.style.width = ''; craftEl.style.height = ''; craftEl.style.color = '';
        }

        const locEl = document.getElementById('stat-location');
        if (locEl) locEl.textContent = master.location || 'Česká Rep.';
        
        const descParts = (master.desc || '').split('.');
        const quote = descParts[0] ? `"${descParts[0].trim()}."` : '"Naučím tě řemeslo tak, jak se ho kdysi učili skuteční mistři."';
        const quoteEl = document.getElementById('master-quote');
        if (quoteEl) {
          quoteEl.textContent = quote;
          quoteEl.classList.remove('skeleton');
          quoteEl.style.width = ''; quoteEl.style.height = ''; quoteEl.style.color = '';
        }

        const descEl = document.getElementById('master-desc');
        if (descEl) {
          if (typeof marked !== 'undefined' && master.desc) {
            descEl.innerHTML = marked.parse(master.desc);
          } else {
            descEl.textContent = master.desc || 'Tento mistr zatím nemá vyplněný svůj příběh.';
          }
        }

        // --- ACCORDIONS ---
        const handleAccordion = (id, value) => {
          const item = document.getElementById(`acc-${id}`);
          const content = document.getElementById(`master-${id}`);
          if (item && content) {
            if (value && value !== '-') {
              item.style.display = 'block';
              if (typeof marked !== 'undefined') {
                content.innerHTML = marked.parse(value);
              } else {
                content.textContent = value;
              }
            } else {
              item.style.display = 'none';
            }
          }
        };

        handleAccordion('requirements', master.requirements);
        handleAccordion('motivation', master.stats?.["Co nás motivuje učit"]);
        handleAccordion('accommodation', master.accommodation);
        handleAccordion('compensation', master.compensation);
        handleAccordion('recommendations', master.recommendations);

        // Accordion Toggle Logic
        document.querySelectorAll('.accordion-trigger').forEach(trigger => {
          trigger.onclick = () => {
            const item = trigger.parentElement;
            item.classList.toggle('active');
          };
        });

        const heroBg = document.getElementById('hero-bg');
        if (heroBg) {
          const photo = master.photo || 'mystery_master.png';
          heroBg.style.backgroundImage = `linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%), url('${photo}')`;
          if (master.photoSettings) {
            heroBg.style.backgroundPosition = `${50 + (master.photoSettings.x || 0)}% ${50 + (master.photoSettings.y || 0)}%`;
          }
        }

        // Stats
        const statStudents = document.getElementById('stat-students');
        if (statStudents) {
          let kapacitaStr = master.stats?.['Kapacita učedníků'];
          let labelEl = statStudents.nextElementSibling;
          
          if (!kapacitaStr) {
            statStudents.textContent = 'Individuální';
            if (labelEl) labelEl.textContent = 'kapacita';
          } else {
            let num = parseInt(kapacitaStr, 10);
            if (!isNaN(num) && num.toString() === kapacitaStr.toString().trim()) {
              statStudents.textContent = num;
              if (labelEl) {
                if (num === 1) labelEl.textContent = 'učedník';
                else if (num >= 2 && num <= 4) labelEl.textContent = 'učedníci';
                else labelEl.textContent = 'učedníků';
              }
            } else {
              statStudents.textContent = kapacitaStr;
              if (labelEl) labelEl.textContent = 'kapacita';
            }
          }
        }

        // --- AUDIO PLAYER ---
        const audioContainer = document.getElementById('audio-player-container');
        const audioEl = document.getElementById('main-audio');
        const playBtn = document.getElementById('btn-audio-play');
        const circle = document.querySelector('.progress-ring__circle');
        const canvas = document.getElementById('audio-visualizer');
        const ctxCanvas = canvas ? canvas.getContext('2d') : null;
        const circumference = 2 * Math.PI * 28;

        let audioCtx, analyser, dataArray, source;

        const initAudioContext = () => {
          if (audioCtx) return;
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          source = audioCtx.createMediaElementSource(audioEl);
          source.connect(analyser);
          analyser.connect(audioCtx.destination);
          dataArray = new Uint8Array(analyser.frequencyBinCount);
        };

        const drawVisualizer = () => {
          if (!audioEl || !ctxCanvas || !analyser) return;
          if (!audioEl.paused) {
            requestAnimationFrame(drawVisualizer);
            analyser.getByteTimeDomainData(dataArray);
            ctxCanvas.clearRect(0, 0, canvas.width, canvas.height);
            ctxCanvas.lineWidth = 2;
            ctxCanvas.strokeStyle = "#f5b932";
            ctxCanvas.beginPath();
            const sliceWidth = canvas.width * 1.0 / analyser.frequencyBinCount;
            let x = 0;
            for (let i = 0; i < analyser.frequencyBinCount; i++) {
              const v = dataArray[i] / 128.0;
              const y = ((v - 1) * 2 + 1) * canvas.height / 2;
              if (i === 0) ctxCanvas.moveTo(x, y);
              else ctxCanvas.lineTo(x, y);
              x += sliceWidth;
            }
            ctxCanvas.lineTo(canvas.width, canvas.height / 2);
            ctxCanvas.stroke();
          } else {
            ctxCanvas.clearRect(0, 0, canvas.width, canvas.height);
          }
        };

        const resizeCanvas = () => {
          if (canvas) {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
          }
        };
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        if (audioEl && typeof getAudio === 'function') {
          let audioSrc = master.audio;
          if (audioSrc && audioSrc.startsWith("idb:")) {
            audioSrc = await getAudio(audioSrc.replace("idb:", ""));
          } else {
            audioSrc = await getAudio(`audio_${master.id}`) || master.audio;
          }

          if (audioSrc && audioContainer) {
            audioContainer.style.display = 'flex';
            resizeCanvas();
            audioEl.src = audioSrc;
            
            if (playBtn) {
              playBtn.onclick = () => {
                initAudioContext();
                if (audioEl.paused) {
                  audioEl.play().then(() => {
                    playBtn.innerHTML = '<i class="bi bi-pause-fill"></i>';
                    drawVisualizer();
                  }).catch(e => console.error("Playback failed", e));
                } else {
                  audioEl.pause();
                  playBtn.innerHTML = '<i class="bi bi-play-fill" style="margin-left:3px;"></i>';
                }
              };
            }

            audioEl.ontimeupdate = () => {
              if (circle) {
                const progress = audioEl.currentTime / audioEl.duration;
                const offset = circumference - progress * circumference;
                circle.style.strokeDashoffset = offset;
              }
            };

            audioEl.onended = () => {
              if (playBtn) playBtn.innerHTML = '<i class="bi bi-play-fill" style="margin-left:3px;"></i>';
              if (circle) circle.style.strokeDashoffset = circumference;
              if (ctxCanvas) ctxCanvas.clearRect(0, 0, canvas.width, canvas.height);
            };
          }
        }

        // --- GALLERY ---
        const scroller = document.getElementById('gallery-scroller');
        const gallery = master.gallery || [];
        
        const lightbox = document.getElementById('lightbox');
        const lbContent = document.getElementById('lightbox-content');
        const lbClose = document.getElementById('lightbox-close');

        const openLightbox = (index) => {
          if (!lbContent || !lightbox) return;
          lbContent.innerHTML = '';
          gallery.forEach((item, idx) => {
            let el;
            if (item.type === 'video') {
              el = document.createElement('video');
              el.src = item.src;
              el.controls = true;
            } else {
              el = document.createElement('img');
              el.src = item.src;
            }
            if (idx === index) el.style.display = 'block';
            lbContent.appendChild(el);
          });
          lightbox.style.display = 'flex';
        };

        if (scroller) {
          if (gallery.length === 0) {
            scroller.parentElement.style.display = 'none';
            const h2 = scroller.parentElement.previousElementSibling;
            if (h2 && h2.tagName === 'H2') h2.style.display = 'none';
          } else {
            gallery.forEach((item, idx) => {
              const div = document.createElement('div');
              div.className = 'gallery-item';
              div.innerHTML = `
                <div class="gallery-index">${String(idx + 1).padStart(2, '0')}/${String(gallery.length).padStart(2, '0')}</div>
                ${item.type === 'video' ? `<video src="${item.src}"></video>` : `<img src="${item.src}" alt="">`}
              `;
              div.onclick = () => openLightbox(idx);
              scroller.appendChild(div);
            });
          }
        }
        
        if (lbClose) lbClose.onclick = () => { lightbox.style.display = 'none'; };

        // --- SOCIALS ---
        const socials = document.getElementById('master-socials');
        if (socials) {
          const socialConfigs = [
            { key: "fb", icon: "bi-facebook" },
            { key: "ig", icon: "bi-instagram" },
            { key: "tt", icon: "bi-tiktok" },
            { key: "li", icon: "bi-linkedin" },
            { key: "yt", icon: "bi-youtube" }
          ];
          socialConfigs.forEach(conf => {
            if (master.socials?.[conf.key]) {
              const a = document.createElement('a');
              a.href = master.socials[conf.key];
              a.target = "_blank";
              a.innerHTML = `<i class="bi ${conf.icon}"></i>`;
              socials.appendChild(a);
            }
          });
        }

        // --- CONTACT FORM ---
        const btnContact = document.getElementById('btn-contact-top');
        if (btnContact) {
          btnContact.addEventListener('click', () => {
            const accContact = document.getElementById('acc-contact');
            if (accContact) {
              accContact.classList.add('active');
              accContact.scrollIntoView({ behavior: 'smooth' });
            }
          });
        }

        const form = document.getElementById('message-form');
        const notice = document.getElementById('msg-notice');
        const storedSession = JSON.parse(localStorage.getItem('sc2.session') || '{}');
        if (form && storedSession.email) {
          const nameInput = document.getElementById('msg-name');
          const emailInput = document.getElementById('msg-email');
          const phoneInput = document.getElementById('msg-phone');
          if (nameInput) nameInput.value = storedSession.name || '';
          if (emailInput) emailInput.value = storedSession.email || '';
          if (phoneInput) phoneInput.value = storedSession.phone || '';
        }

        if (form) {
          form.onsubmit = async (e) => {
            e.preventDefault();
            if (notice) {
              notice.style.display = 'block';
              notice.style.color = '#333';
              notice.textContent = 'Odesílám...';
            }

            const profile = {
              name: document.getElementById('msg-name').value.trim(),
              phone: document.getElementById('msg-phone').value.trim(),
            };
            const email = document.getElementById('msg-email').value.trim();
            const text = document.getElementById('msg-text').value.trim();

            if (typeof ensureUser === 'function' && typeof getMessages === 'function' && typeof saveMessages === 'function') {
              await ensureUser(email, profile);
              const messages = await getMessages();
              messages.push({
                id: `msg-${Date.now()}`,
                toMaster: id,
                from: email,
                text: text,
                createdAt: new Date().toISOString(),
                deletedByAdmin: false,
                deletedByUser: false,
                userName: profile.name,
                userPhone: profile.phone
              });
              
              const res = await saveMessages(messages);
              if (res && res.status === 'success') {
                // Success Overlay (AI Rule #4)
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                  background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
                  display: flex; flex-direction: column; align-items: center; justify-content: center;
                  z-index: 5000; color: white; text-align: center;
                  animation: overlayIn 0.5s ease-out;
                `;
                overlay.innerHTML = `
                  <div style="font-size: 60px; color: var(--accent); margin-bottom: 20px;">
                    <i class="bi bi-check-circle-fill"></i>
                  </div>
                  <h2 style="font-family: 'Bungee'; font-size: 24px;">ZPRÁVA ODESLÁNA!</h2>
                  <p style="margin-top: 10px; opacity: 0.8;">Mistr se ti ozve co nejdříve.</p>
                  <style>
                    @keyframes overlayIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
                  </style>
                `;
                document.body.appendChild(overlay);
                
                setTimeout(() => {
                  overlay.style.opacity = '0';
                  overlay.style.transition = 'opacity 0.5s ease';
                  setTimeout(() => {
                    overlay.remove();
                    form.reset();
                  }, 500);
                }, 1500);

              } else if (notice) {
                notice.style.color = 'red';
                notice.textContent = 'Chyba při odesílání zprávy.';
              }
            }
          };
        }
      } catch (err) {
        console.error("UI Population error:", err);
      }
      // --- PARALLAX EFFECT ---
      window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        if (heroBg) {
          heroBg.style.transform = `translateY(${scrolled * 0.3}px)`;
        }
      });

      // --- ENTRANCE ANIMATIONS ---
      const observerOptions = { threshold: 0.1 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
          }
        });
      }, observerOptions);

      document.querySelectorAll('.accordion-item, .stat-item, .section-header').forEach(el => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(20px)';
        el.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
        observer.observe(el);
      });

      // --- GALLERY ZOOM ON SCROLL ---
      scroller.addEventListener('scroll', () => {
        const items = scroller.querySelectorAll('.gallery-item');
        const scrollerRect = scroller.getBoundingClientRect();
        const scrollerCenter = scrollerRect.left + scrollerRect.width / 2;

        items.forEach(item => {
          const itemRect = item.getBoundingClientRect();
          const itemCenter = itemRect.left + itemRect.width / 2;
          const dist = Math.abs(scrollerCenter - itemCenter);
          const scale = Math.max(0.9, 1 - dist / 1000);
          item.style.transform = `scale(${scale})`;
        });
      });
    });
  </script>
