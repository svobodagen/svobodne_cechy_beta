<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bez Školy – Detail Mistra (Plně funkční návrh)</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bungee&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  
  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --accent: #f5b932;
      --accent-gradient: linear-gradient(135deg, #f5b932 0%, #d49a1a 100%);
      --bg-black: #000000;
      --bg-light: #f7f7f7;
      --text-white: #ffffff;
      --text-dark: #1a1a1a;
      --text-muted: #71717a;
      --border: rgba(255, 255, 255, 0.1);
      --font-main: 'Plus Jakarta Sans', sans-serif;
      /* Layered shadows for depth */
      --shadow-premium: 
        0 2px 4px rgba(0,0,0,0.02),
        0 10px 20px rgba(0,0,0,0.04),
        0 20px 40px rgba(0,0,0,0.06),
        0 30px 60px rgba(0,0,0,0.08);
      --shadow-dark:
        0 10px 30px rgba(0,0,0,0.5),
        0 20px 60px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-black);
      color: var(--text-white);
      font-family: var(--font-main);
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* App Container */
    .app-viewport {
      max-width: 500px;
      margin: 0 auto;
      background: var(--bg-black);
      min-height: 100vh;
      position: relative;
      padding-top: 100px; /* Dostatek místa pro fixní hlavičku */
      transition: all 0.3s ease;
    }

    /* Header / Logo */
    .app-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0; 
      left: 50%;
      transform: translateX(-50%);
      width: 100%; 
      max-width: 500px; /* Aby lícovala s viewportem */
      z-index: 1000;
      background: rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    .app-logo { 
      text-decoration: none; 
      color: white; 
      display: flex;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
    }
    .app-logo div { font-family: var(--font-main); font-weight: 800; font-size: 16px; line-height: 1; letter-spacing: 1px; text-transform: uppercase; }

    /* Hamburger Menu & Side Drawer */
    .menu-btn {
      background: none;
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
      z-index: 1001;
    }
    .menu-btn:hover { transform: scale(1.1); color: var(--accent); }

    .side-menu {
      position: fixed;
      top: 0; right: -100%;
      width: 300px;
      height: 100vh;
      background: #0a0a0a;
      z-index: 2000;
      padding: 40px 30px;
      transition: right 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: -10px 0 30px rgba(0,0,0,0.5);
      border-left: 1px solid #222;
    }
    .side-menu.active { right: 0; }

    .side-menu-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 40px;
    }

    .side-nav {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .side-nav a {
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
    }
    .side-nav a:hover { color: var(--accent); padding-left: 10px; }
    .side-nav a.active { color: var(--accent); }

    .side-menu-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 1999;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .side-menu-overlay.active { display: block; opacity: 1; }

    /* Responsive adjustments */
    @media (max-width: 1024px) {
      .hero {
        height: auto;
        min-height: 60vh;
      }
    }
    @media (max-width: 768px) {
      .app-logo img {
        height: 48px !important;
      }
    }

    /* Hero Section */
    .hero {
      position: relative;
      height: 85vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 60px 24px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.95) 100%),
                  url('mystery_master.png') center/cover no-repeat;
      z-index: 1;
      transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hero-content { position: relative; z-index: 2; }

    .craft-tag {
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 12px;
      letter-spacing: 2px;
      display: inline-block;
      padding: 4px 0;
      border-bottom: 2px solid var(--accent);
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      line-height: 1.1; /* Zvýšeno pro diakritiku */
      margin: 12px 0 20px 0;
      text-transform: uppercase;
      letter-spacing: -1px;
    }

    .hero .quote {
      font-size: 18px;
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 35px;
      max-width: 95%;
      border-left: 4px solid;
      border-image: linear-gradient(to bottom, var(--accent), transparent) 1;
      padding-left: 20px;
      color: rgba(255,255,255,0.9);
    }

    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 10px;
      font-weight: 800;
      text-transform: uppercase;
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-bottom: 12px;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .btn.primary { 
      background: var(--accent-gradient); 
      color: #000; 
      box-shadow: 0 4px 15px rgba(245, 185, 50, 0.3);
    }
    .btn.outline { 
      background: rgba(255,255,255,0.05); 
      color: white; 
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(5px);
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: scale(0.96); }

    .stats-bar {
      background: #fff;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      color: var(--text-dark);
      margin: 20px 0 30px 0;
      border-radius: 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      position: relative;
      z-index: 15;
    }

    .stat-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .stat-icon {
      width: 40px; height: 40px;
      background: #e0e0e0;
      color: #000;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .stat-item strong { font-size: 14px; font-weight: 800; display: block; line-height: 1.2; color: var(--text-dark); }
    .stat-item span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }

    /* Audio Player */
    .audio-player-container {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 0 0 30px 0;
      padding: 20px 0;
      border-bottom: 1px solid #f0f0f0;
      width: auto;
      position: relative;
      z-index: 20;
    }

    .player-main {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: auto;
    }

    .play-button-wrapper {
      position: relative;
      width: 120px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-button {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--text-dark);
      border: none;
      outline: none;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 28px;
      box-shadow: 0 0 20px rgba(245, 185, 50, 0.4);
    }

    .play-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(245, 185, 50, 0.6);
    }

    .progress-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-90deg);
      pointer-events: none;
      z-index: 11;
    }

    .progress-ring__circle {
      transition: stroke-dashoffset 0.1s linear;
      stroke: #ffffff;
    }

    .visualizer-canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 40px;
      background: transparent;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    .audio-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dark);
      font-weight: 800;
      transition: transform 0.4s ease;
    }

    /* Reference Accordion Special Styles */
    #acc-reference .accordion-icon {
      background: none;
      width: auto;
      height: auto;
    }
    #acc-reference .accordion-title-box {
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #acc-reference.playing .accordion-title-box {
      transform: translateX(110px);
    }
    #acc-reference .visualizer-canvas {
      position: absolute;
      left: 70px;
      top: 50%;
      transform: translateY(-50%);
      width: 100px;
      height: 30px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #acc-reference.playing .visualizer-canvas {
      opacity: 1;
    }

    /* Content Area */
    .content-area {
      background: white;
      color: var(--text-dark);
      padding: 40px 24px;
      border-radius: 0;
      margin-top: 0;
      position: relative;
      z-index: 10;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    }

    /* Accordion Improved */
    .accordion-item {
      background: white;
      border-radius: 16px;
      margin-bottom: 16px;
      border: 1px solid #f0f0f0;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-premium);
    }
    
    .accordion-item:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .accordion-trigger {
      width: 100%;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }

    .accordion-icon {
      width: 44px;
      height: 44px;
      background: #e0e0e0;
      color: #000;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .accordion-item.active .accordion-icon {
      background: var(--accent);
      color: #000;
      transform: rotate(10deg);
    }

    .accordion-title-box {
      flex-grow: 1;
    }

    .accordion-title {
      display: block;
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-dark);
      line-height: 1.2;
      letter-spacing: 0.5px;
    }

    .accordion-subtitle {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .accordion-caret {
      color: var(--text-muted);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 18px;
    }

    .accordion-item.active .accordion-caret {
      transform: rotate(180deg);
      color: var(--accent);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s ease, opacity 0.3s ease;
      padding: 0 20px;
      opacity: 0;
    }

    .accordion-item.active .accordion-content {
      max-height: 3000px;
      padding: 0 20px 30px 20px;
      opacity: 1;
    }

    /* Inverse (Dark) Accordion */
    .accordion-item.inverse {
      background: #000;
      border-color: #222;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .accordion-item.inverse:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 15px rgba(245, 185, 50, 0.1);
    }
    .accordion-item.inverse .accordion-title { color: #fff; }
    .accordion-item.inverse .accordion-subtitle { color: var(--accent); opacity: 0.8; }
    .accordion-item.inverse .accordion-icon { background: var(--accent); color: #000; }
    .accordion-item.inverse .accordion-caret { color: #fff; }
    .accordion-item.inverse .form-group label { color: #aaa; }
    .accordion-item.inverse input, .accordion-item.inverse textarea {
      background: #111;
      border-color: #333;
      color: #fff;
      padding: 16px;
    }
    .accordion-item.inverse input:focus, .accordion-item.inverse textarea:focus {
      border-color: var(--accent);
      outline: none;
    }

    .description {
      font-size: 15px;
      line-height: 1.7;
      color: #444;
    }
    .description p { margin-bottom: 20px; }
    .description ul { padding-left: 20px; margin-bottom: 20px; }
    .description li { margin-bottom: 8px; list-style-type: none; position: relative; }
    .description li::before { content: "•"; color: var(--accent); font-weight: bold; position: absolute; left: -15px; }
    .description strong { color: #000; font-weight: 800; }

    /* Tags */
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }
    .tag {
      background: #f0f0f0;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dark);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tag.aura { background: var(--accent-gradient); color: #000; }

    /* Gallery */
    .gallery-container {
      margin: 30px -24px;
      position: relative;
    }
    .gallery-scroller {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 0 24px 30px 24px;
      scrollbar-width: none;
    }
    .gallery-scroller::-webkit-scrollbar { display: none; }
    
    .gallery-item {
      flex: 0 0 82%;
      aspect-ratio: 4/5;
      scroll-snap-align: center;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .gallery-item:active { transform: scale(0.95); }
    .gallery-item img, .gallery-item video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .gallery-index {
      position: absolute;
      top: 20px; right: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      z-index: 5;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .craft-tag {
      display: inline-flex;
      padding: 6px 14px;
      background: rgba(245, 185, 50, 0.1);
      color: var(--accent);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      border: 1px solid rgba(245, 185, 50, 0.2);
      line-height: 1.4;
      margin-bottom: 12px;
    }

    h1 {
      line-height: 1.1;
      margin-bottom: 16px;
    }

    /* Socials */
    .social-row {
      display: flex;
      justify-content: flex-start;
      gap: 24px;
      margin-bottom: 30px;
      font-size: 26px;
    }
    .social-row a { 
      color: var(--text-dark); 
      transition: all 0.3s ease; 
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px; height: 50px;
      background: #e0e0e0;
      border-radius: 50%;
    }
    .social-row a:hover { 
      color: #000; 
      background: var(--accent);
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(245, 185, 50, 0.4);
    }

    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ============================================
       DEVICE SWITCHER BAR
       ============================================ */
    .device-switcher {
      position: fixed;
      top: 0; left: 0; width: 100%;
      z-index: 10000;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .device-switcher button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #fff;
      font-family: var(--font-main);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .device-switcher button.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .device-switcher button:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
    }
    body { padding-top: 42px; }

    /* ============================================
       TABLET LAYOUT (body.layout-tablet)
       ============================================ */
    body.layout-tablet { background: #0a0a0a; }
    body.layout-tablet .app-viewport {
      max-width: 768px;
      box-shadow: 0 0 100px rgba(0,0,0,0.8);
    }
    body.layout-tablet .hero { height: 60vh; }
    body.layout-tablet .hero h1 { font-size: 56px; }
    body.layout-tablet .content-area { padding: 50px 40px; }
    body.layout-tablet .accordion-trigger { padding: 24px; }
    body.layout-tablet .stats-bar { padding: 24px 40px; }
    body.layout-tablet .gallery-item { flex: 0 0 46%; }
    body.layout-tablet .tab-bar { max-width: 768px; }

    /* ============================================
       DESKTOP LAYOUT (body.layout-desktop)
       ============================================ */
    body.layout-desktop { background: #0a0a0a; }
    body.layout-desktop .app-viewport {
      max-width: 1400px;
      display: grid;
      grid-template-columns: 45% 55%;
      grid-template-rows: auto;
      padding-bottom: 0;
      box-shadow: 0 0 120px rgba(0,0,0,0.9);
    }

    /* Header spans full width */
    body.layout-desktop .app-header {
      grid-column: 1 / -1;
      position: sticky;
      top: 42px;
      z-index: 100;
    }

    /* Hero = sticky left photo panel */
    body.layout-desktop .hero {
      grid-column: 1;
      grid-row: 2 / 20;
      position: sticky;
      top: 42px;
      height: calc(100vh - 42px);
      padding: 0 48px 40px 48px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    body.layout-desktop .hero-bg {
      background-size: cover;
    }
    body.layout-desktop .hero h1 { font-size: 56px; }
    body.layout-desktop .hero .quote { font-size: 18px; max-width: 90%; margin-bottom: 20px; }
    body.layout-desktop .hero .craft-tag { margin-bottom: 8px; }
    body.layout-desktop .btn { max-width: 360px; margin-bottom: 8px; }
    body.layout-desktop .audio-player-container {
      justify-content: flex-start;
    }
    body.layout-desktop .stats-bar {
      grid-column: 2;
      padding: 24px 48px;
      margin: 0;
    }
    body.layout-desktop .content-area {
      grid-column: 2;
      padding: 50px 48px;
      box-shadow: none;
    }
    body.layout-desktop .description { font-size: 16px; line-height: 1.8; }
    body.layout-desktop .accordion-trigger { padding: 24px 28px; }
    body.layout-desktop .accordion-title { font-size: 16px; }

    /* Gallery = grid on desktop */
    body.layout-desktop .gallery-container { margin: 30px 0; }
    body.layout-desktop .gallery-scroller {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      overflow-x: visible;
      scroll-snap-type: none;
      padding: 0 0 20px 0;
    }

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      let id = params.get('id');

      // Helper for Master Picker
      async function showPicker() {
        const masters = await getMasters(false);
        const picker = document.createElement('div');
        picker.id = 'master-picker';
        picker.innerHTML = `
          <div class="picker-card">
            <h2>Vyberte mistra</h2>
            <p style="color:var(--text-muted); margin-bottom: 25px;">Zvolte mistra pro náhled nového designu:</p>
            <select id="picker-select">
              <option value="">-- Vyberte --</option>
              ${masters.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}
            </select>
            <button class="btn primary" id="picker-btn">ZOBRAZIT NÁVRH</button>
          </div>
        `;
        document.body.appendChild(picker);
        document.getElementById('picker-btn').onclick = () => {
          const sid = document.getElementById('picker-select').value;
          if (sid) window.location.href = `mistr-detail-new.html?id=${sid}`;
        };
      }

      if (!id) { await showPicker(); return; }

      const master = await getMaster(id);
      if (!master) { await showPicker(); return; }

      // --- POPULATE UI ---
      try {
        if (!master.name) { console.error("Master name missing"); return; }
        document.title = `Bez Školy – ${master.name}`;
        const nameEl = document.getElementById('master-name');
        if (nameEl) {
          nameEl.innerHTML = (master.name || '').split(' ').join('<br>');
          nameEl.classList.remove('skeleton');
          nameEl.style.width = ''; nameEl.style.height = ''; nameEl.style.color = '';
        }

        const craftEl = document.getElementById('master-craft');
        if (craftEl) {
          craftEl.textContent = (master.craft || 'Řemeslo').toUpperCase();
          craftEl.classList.remove('skeleton');
          craftEl.style.width = ''; craftEl.style.height = ''; craftEl.style.color = '';
        }

        const locEl = document.getElementById('stat-location');
        if (locEl) locEl.textContent = master.location || 'Česká Rep.';
        
        const descParts = (master.desc || '').split('.');
        const quote = descParts[0] ? `"${descParts[0].trim()}."` : '"Naučím tě řemeslo tak, jak se ho kdysi učili skuteční mistři."';
        const quoteEl = document.getElementById('master-quote');
        if (quoteEl) {
          quoteEl.textContent = quote;
          quoteEl.classList.remove('skeleton');
          quoteEl.style.width = ''; quoteEl.style.height = ''; quoteEl.style.color = '';
        }

        const storyContent = document.getElementById('master-story-content');
        if (storyContent) {
          if (master.story && master.story !== '-') {
            if (typeof marked !== 'undefined') {
              marked.setOptions({ breaks: true });
              storyContent.innerHTML = marked.parse(master.story);
            } else {
              storyContent.textContent = master.story;
            }
          } else {
            storyContent.textContent = 'K tomuto mistru zatím není vyplněn příběh.';
          }
        }

        // --- ACCORDIONS ---
        const handleAccordion = (id, value) => {
          const item = document.getElementById(`acc-${id}`);
          const content = document.getElementById(`master-${id}`);
          if (item && content) {
            if (value && value !== '-') {
              item.style.display = 'block';
              if (typeof marked !== 'undefined') {
                content.innerHTML = marked.parse(value);
              } else {
                content.textContent = value;
              }
            } else {
              item.style.display = 'none';
            }
          }
        };

        handleAccordion('education', master.education);
        
        // Manual handle for reference to match its specific ID 'acc-reference'
        const accRef = document.getElementById('acc-reference');
        const contentRef = document.getElementById('master-reference-sc');
        if (accRef && contentRef) {
          const val = master.reference_sc;
          if ((master.audio && master.audio !== '-') || (val && val !== '-')) {
            accRef.style.display = 'block';
            if (val && val !== '-') {
              if (typeof marked !== 'undefined') contentRef.innerHTML = marked.parse(val);
              else contentRef.textContent = val;
            } else {
              contentRef.innerHTML = '<p class="muted">K tomuto mistru zatím není k dispozici slovní reference, ale můžete si poslechnout audio.</p>';
            }
          } else {
            accRef.style.display = 'none';
          }
        }

        handleAccordion('requirements', master.requirements);
        handleAccordion('motivation', master.stats?.["Co nás motivuje učit"]);
        handleAccordion('accommodation', master.accommodation);
        handleAccordion('compensation', master.compensation);
        handleAccordion('recommendations', master.recommendations);

        // Accordion Toggle Logic
        document.querySelectorAll('.accordion-trigger').forEach(trigger => {
          trigger.onclick = (e) => {
            // If we clicked the play button, don't toggle the accordion
            if (e.target.closest('#btn-audio-play')) return;
            
            const item = trigger.parentElement;
            item.classList.toggle('active');
          };
        });

        const heroBg = document.getElementById('hero-bg');
        if (heroBg) {
          const photo = master.photo || 'mystery_master.png';
          heroBg.style.backgroundImage = `linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%), url('${photo}')`;
          if (master.photoSettings) {
            heroBg.style.backgroundPosition = `${50 + (master.photoSettings.x || 0)}% ${50 + (master.photoSettings.y || 0)}%`;
          }
        }

        // Stats
        const statStudents = document.getElementById('stat-students');
        if (statStudents) {
          let kapacitaStr = master.stats?.['Kapacita učedníků'];
          
          if (!kapacitaStr) {
            statStudents.textContent = 'Individuální';
          } else {
            let num = parseInt(kapacitaStr, 10);
            if (!isNaN(num) && num.toString() === kapacitaStr.toString().trim()) {
              if (num === 1) statStudents.textContent = num + ' učedník';
              else if (num >= 2 && num <= 4) statStudents.textContent = num + ' učedníci';
              else statStudents.textContent = num + ' učedníků';
            } else {
              statStudents.textContent = kapacitaStr;
            }
          }
        }

        // --- AUDIO PLAYER ---
        const audioContainer = document.getElementById('audio-player-container');
        const audioEl = document.getElementById('main-audio');
        const playBtn = document.getElementById('btn-audio-play');
        const circle = document.querySelector('.progress-ring__circle');
        const canvas = document.getElementById('audio-visualizer');
        const ctxCanvas = canvas ? canvas.getContext('2d') : null;
        const circumference = 2 * Math.PI * 28;

        let audioCtx, analyser, dataArray, source;

        const initAudioContext = () => {
          if (audioCtx) return;
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          source = audioCtx.createMediaElementSource(audioEl);
          source.connect(analyser);
          analyser.connect(audioCtx.destination);
          dataArray = new Uint8Array(analyser.frequencyBinCount);
        };

        const drawVisualizer = () => {
          if (!audioEl || !ctxCanvas || !analyser) return;
          if (!audioEl.paused) {
            requestAnimationFrame(drawVisualizer);
            analyser.getByteTimeDomainData(dataArray);
            ctxCanvas.clearRect(0, 0, canvas.width, canvas.height);
            ctxCanvas.lineWidth = 2;
            ctxCanvas.strokeStyle = "#f5b932";
            ctxCanvas.beginPath();
            const sliceWidth = canvas.width * 1.0 / analyser.frequencyBinCount;
            let x = 0;
            for (let i = 0; i < analyser.frequencyBinCount; i++) {
              const v = dataArray[i] / 128.0;
              const y = ((v - 1) * 2 + 1) * canvas.height / 2;
              if (i === 0) ctxCanvas.moveTo(x, y);
              else ctxCanvas.lineTo(x, y);
              x += sliceWidth;
            }
            ctxCanvas.lineTo(canvas.width, canvas.height / 2);
            ctxCanvas.stroke();
          } else {
            ctxCanvas.clearRect(0, 0, canvas.width, canvas.height);
          }
        };

        const resizeCanvas = () => {
          if (canvas) {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
          }
        };
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        if (audioEl && typeof getAudio === 'function') {
          let audioSrc = master.audio;
          if (audioSrc && audioSrc.startsWith("idb:")) {
            audioSrc = await getAudio(audioSrc.replace("idb:", ""));
          } else {
            audioSrc = await getAudio(`audio_${master.id}`) || master.audio;
          }

          if (audioSrc) {
            resizeCanvas();
            audioEl.src = audioSrc;
            
            if (playBtn) {
              playBtn.onclick = (e) => {
                e.stopPropagation(); // Stop event from reaching the accordion trigger
                initAudioContext();
                const accRef = document.getElementById('acc-reference');
                if (audioEl.paused) {
                  audioEl.play().then(() => {
                    playBtn.innerHTML = '<i class="bi bi-pause-fill"></i>';
                    if (accRef) accRef.classList.add('playing');
                    drawVisualizer();
                  }).catch(e => console.error("Playback failed", e));
                } else {
                  audioEl.pause();
                  playBtn.innerHTML = '<i class="bi bi-play-fill" style="margin-left:1px;"></i>';
                  if (accRef) accRef.classList.remove('playing');
                }
              };
            }

            audioEl.ontimeupdate = () => {
              if (circle) {
                const progress = audioEl.currentTime / audioEl.duration;
                const circumferenceSmall = 2 * Math.PI * 30;
                const offset = circumferenceSmall - progress * circumferenceSmall;
                circle.style.strokeDashoffset = offset;
              }
            };

            audioEl.onended = () => {
              if (playBtn) playBtn.innerHTML = '<i class="bi bi-play-fill" style="margin-left:1px;"></i>';
              if (circle) {
                 const circumferenceSmall = 2 * Math.PI * 30;
                 circle.style.strokeDashoffset = circumferenceSmall;
              }
              const accRef = document.getElementById('acc-reference');
              if (accRef) accRef.classList.remove('playing');
              if (ctxCanvas) ctxCanvas.clearRect(0, 0, canvas.width, canvas.height);
            };
          }
        }

        // --- GALLERY ---
        const scroller = document.getElementById('gallery-scroller');
        const gallery = master.gallery || [];
        
        const lightbox = document.getElementById('lightbox');
        const lbContent = document.getElementById('lightbox-content');
        const lbClose = document.getElementById('lightbox-close');

        const openLightbox = (index) => {
          if (!lbContent || !lightbox) return;
          lbContent.innerHTML = '';
          gallery.forEach((item, idx) => {
            let el;
            if (item.type === 'video') {
              el = document.createElement('video');
              el.src = item.src;
              el.controls = true;
            } else {
              el = document.createElement('img');
              el.src = item.src;
            }
            if (idx === index) el.style.display = 'block';
            lbContent.appendChild(el);
          });
          lightbox.style.display = 'flex';
        };

        if (scroller) {
          if (gallery.length === 0) {
            scroller.parentElement.style.display = 'none';
            const h2 = scroller.parentElement.previousElementSibling;
            if (h2 && h2.tagName === 'H2') h2.style.display = 'none';
          } else {
            gallery.forEach((item, idx) => {
              const div = document.createElement('div');
              div.className = 'gallery-item';
              div.innerHTML = `
                <div class="gallery-index">${String(idx + 1).padStart(2, '0')}/${String(gallery.length).padStart(2, '0')}</div>
                ${item.type === 'video' ? `<video src="${item.src}"></video>` : `<img src="${item.src}" alt="">`}
              `;
              div.onclick = () => openLightbox(idx);
              scroller.appendChild(div);
            });
          }
        }
        
        if (lbClose) lbClose.onclick = () => { lightbox.style.display = 'none'; };

        // --- SOCIALS ---
        const socials = document.getElementById('master-socials');
        if (socials) {
          const socialConfigs = [
            { key: "fb", icon: "bi-facebook" },
            { key: "ig", icon: "bi-instagram" },
            { key: "tt", icon: "bi-tiktok" },
            { key: "li", icon: "bi-linkedin" },
            { key: "yt", icon: "bi-youtube" }
          ];
          socialConfigs.forEach(conf => {
            if (master.socials?.[conf.key]) {
              const a = document.createElement('a');
              a.href = master.socials[conf.key];
              a.target = "_blank";
              a.innerHTML = `<i class="bi ${conf.icon}"></i>`;
              socials.appendChild(a);
            }
          });
        }

        // --- CONTACT FORM ---
        const btnContact = document.getElementById('btn-contact-top');
        if (btnContact) {
          btnContact.addEventListener('click', () => {
            const accContact = document.getElementById('acc-contact');
            if (accContact) {
              accContact.classList.add('active');
              accContact.scrollIntoView({ behavior: 'smooth' });
            }
          });
        }

        const form = document.getElementById('message-form');
        const notice = document.getElementById('msg-notice');
        const storedSession = JSON.parse(localStorage.getItem('sc2.session') || '{}');
        if (form && storedSession.email) {
          const nameInput = document.getElementById('msg-name');
          const emailInput = document.getElementById('msg-email');
          const phoneInput = document.getElementById('msg-phone');
          if (nameInput) nameInput.value = storedSession.name || '';
          if (emailInput) emailInput.value = storedSession.email || '';
          if (phoneInput) phoneInput.value = storedSession.phone || '';
        }

        if (form) {
          form.onsubmit = async (e) => {
            e.preventDefault();
            if (notice) {
              notice.style.display = 'block';
              notice.style.color = '#333';
              notice.textContent = 'Odesílám...';
            }

            const profile = {
              name: document.getElementById('msg-name').value.trim(),
              phone: document.getElementById('msg-phone').value.trim(),
            };
            const email = document.getElementById('msg-email').value.trim();
            const text = document.getElementById('msg-text').value.trim();

            if (typeof ensureUser === 'function' && typeof getMessages === 'function' && typeof saveMessages === 'function') {
              await ensureUser(email, profile);
              const messages = await getMessages();
              messages.push({
                id: `msg-${Date.now()}`,
                toMaster: id,
                from: email,
                text: text,
                createdAt: new Date().toISOString(),
                deletedByAdmin: false,
                deletedByUser: false,
                userName: profile.name,
                userPhone: profile.phone
              });
              
              const res = await saveMessages(messages);
              if (res && res.status === 'success') {
                // Success Overlay (AI Rule #4)
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                  background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
                  display: flex; flex-direction: column; align-items: center; justify-content: center;
                  z-index: 5000; color: white; text-align: center;
                  animation: overlayIn 0.5s ease-out;
                `;
                overlay.innerHTML = `
                  <div style="font-size: 60px; color: var(--accent); margin-bottom: 20px;">
                    <i class="bi bi-check-circle-fill"></i>
                  </div>
                  <h2 style="font-family: 'Bungee'; font-size: 24px;">ZPRÁVA ODESLÁNA!</h2>
                  <p style="margin-top: 10px; opacity: 0.8;">Mistr se ti ozve co nejdříve.</p>
                  <style>
                    @keyframes overlayIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
                  </style>
                `;
                document.body.appendChild(overlay);
                
                setTimeout(() => {
                  overlay.style.opacity = '0';
                  overlay.style.transition = 'opacity 0.5s ease';
                  setTimeout(() => {
                    overlay.remove();
                    form.reset();
                  }, 500);
                }, 1500);

              } else if (notice) {
                notice.style.color = 'red';
                notice.textContent = 'Chyba při odesílání zprávy.';
              }
            }
          };
        }
      } catch (err) {
        console.error("UI Population error:", err);
      }
      // --- PARALLAX EFFECT ---
      window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        if (heroBg) {
          heroBg.style.transform = `translateY(${scrolled * 0.3}px)`;
        }
      });

      // --- ENTRANCE ANIMATIONS ---
      const observerOptions = { threshold: 0.1 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
          }
        });
      }, observerOptions);

      document.querySelectorAll('.accordion-item, .stat-item, .section-header').forEach(el => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(20px)';
        el.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
        observer.observe(el);
      });

      // --- GALLERY ZOOM ON SCROLL ---
      scroller.addEventListener('scroll', () => {
        const items = scroller.querySelectorAll('.gallery-item');
        const scrollerRect = scroller.getBoundingClientRect();
        const scrollerCenter = scrollerRect.left + scrollerRect.width / 2;

        items.forEach(item => {
          const itemRect = item.getBoundingClientRect();
          const itemCenter = itemRect.left + itemRect.width / 2;
          const dist = Math.abs(scrollerCenter - itemCenter);
          const scale = Math.max(0.9, 1 - dist / 1000);
          item.style.transform = `scale(${scale})`;
        });
      });
    });
  </script>

  <script>
    // --- DEVICE SWITCHER ---
    function setLayout(mode) {
      document.body.classList.remove('layout-phone', 'layout-tablet', 'layout-desktop');
      document.body.classList.add('layout-' + mode);
      document.querySelectorAll('.device-switcher button').forEach(b => b.classList.remove('active'));
      document.getElementById('sw-' + mode).classList.add('active');
      localStorage.setItem('sc2.layoutMode', mode);
    }

    function autoDetectLayout() {
      const saved = localStorage.getItem('sc2.layoutMode');
      if (saved) { setLayout(saved); return; }
      const w = window.innerWidth;
      if (w >= 1024) setLayout('desktop');
      else if (w >= 768) setLayout('tablet');
      else setLayout('phone');
    }

    autoDetectLayout();

    // --- HAMBURGER MENU LOGIC ---
    const menuOpen = document.getElementById('menu-open');
    const menuClose = document.getElementById('menu-close');
    const sideMenu = document.getElementById('side-menu');
    const menuOverlay = document.getElementById('menu-overlay');

    if (menuOpen && menuClose && sideMenu && menuOverlay) {
      const toggleMenu = (state) => {
        sideMenu.classList.toggle('active', state);
        menuOverlay.classList.toggle('active', state);
        document.body.style.overflow = state ? 'hidden' : ''; // Prevent scroll when menu is open
      };

      menuOpen.addEventListener('click', () => toggleMenu(true));
      menuClose.addEventListener('click', () => toggleMenu(false));
      menuOverlay.addEventListener('click', () => toggleMenu(false));
      
      // Close menu on ESC key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') toggleMenu(false);
      });
    }
  </script>
</body>
