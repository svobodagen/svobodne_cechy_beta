<!doctype html>
<html lang="cs">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Svobodné cechy – Detail mistra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css?v=202605020920" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="page">
  <header class="site-header">
    <a class="logo" href="index.html">
      <img src="LOGO_SC2.svg" alt="Svobodné cechy" />
    </a>
    <div class="user-menu">
      <button class="user-link" type="button" id="user-toggle" aria-expanded="false">Profil</button>
      <div class="user-dropdown" id="user-dropdown" hidden>
        <a href="profil.html">Profil</a>
        <a href="admin.html" class="admin-only">Administrace</a>
        <button type="button" id="user-logout" class="user-logout">Odhlásit</button>
      </div>
    </div>
    <button class="nav-toggle" type="button" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav">
      <a href="index.html">Úvod</a>

      <a href="mistri.html" class="active">Mistři</a>


    </nav>
  </header>

  <main>
    <section class="master-detail-page">
      <div class="detail-card">
        <div class="detail-media" id="detail-media"></div>
        <div class="detail-main">
          <span class="badge" id="detail-rank"></span>
          <h1 id="detail-name"></h1>
          <p class="lead" id="detail-craft"></p>
          <p id="detail-desc"></p>
          <div class="master-stats" id="detail-stats"></div>
          <div class="master-tags" id="detail-tags"></div>
          <div id="tag-game-box" class="tag-game-box"></div>
        </div>
      </div>
      <div class="socials-row" id="master-socials"></div>

      <div class="form-card">
        <button class="accordion-btn" type="button" id="message-toggle" aria-expanded="false">
          <span>Napiš mistrovi</span>
          <span class="accordion-caret" aria-hidden="true">▸</span>
        </button>
        <div class="accordion-panel" id="message-panel" hidden>
          <p class="lead" style="font-size: 14px;">Pokud nejsi přihlášen, účet se vytvoří automaticky po odeslání
            zprávy.</p>
          <form id="message-form" autocomplete="on">
            <div>
              <label for="msg-name">Jméno</label>
              <input id="msg-name" name="name" type="text" autocomplete="name" required />
            </div>
            <div>
              <label for="msg-email">Email (uživatelské jméno)</label>
              <input id="msg-email" name="email" type="email" autocomplete="email" required />
            </div>
            <div>
              <label for="msg-phone">Telefon</label>
              <input id="msg-phone" name="phone" type="tel" autocomplete="tel" inputmode="tel" required />
            </div>
            <div>
              <label for="msg-text">Zpráva</label>
              <textarea id="msg-text" name="message" autocomplete="off" required></textarea>
            </div>
            <button class="btn primary" type="submit">Odeslat zprávu</button>
            <div class="notice" id="msg-notice" style="display:none;"></div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>Svobodné cechy</span>
    <span>Učednictví pro generaci 12–18</span>
  </footer>

  <script src="app.js?v=202605020920"></script>
</body>

</html>
