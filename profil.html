<!doctype html>
<html lang="cs">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Svobodné cechy – Profil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css?v=202605051638" />
</head>

<body class="page">
  <header class="site-header">
    <a class="logo" href="index.html">
      <img src="LOGO_SC2.svg" alt="Svobodné cechy" />
    </a>
    <div class="user-menu">
      <button class="user-link" type="button" id="user-toggle" aria-expanded="false">Profil</button>
      <div class="user-dropdown" id="user-dropdown" hidden>
        <a href="profil.html">Profil</a>
        <a href="admin.html" class="admin-only">Administrace</a>
        <button type="button" id="user-logout" class="user-logout">Odhlásit</button>
      </div>
    </div>
    <button class="nav-toggle" type="button" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav">
      <a href="index.html">Úvod</a>

      <a href="mistri.html">Mistři</a>


    </nav>
  </header>

  <main>
    <section class="auth-grid">
      <div class="form-card" id="profile-guard">
        <h2>Profil</h2>
        <p class="lead" style="font-size:14px;">Nejsi přihlášen. Přihlaš se, abys mohl spravovat svůj účet.</p>
        <a class="btn primary" href="login.html">Přejít na přihlášení</a>
      </div>

      <div class="form-card" id="profile-card" style="display:none;">
        <h2>Můj profil</h2>
        <div class="notice" id="profile-summary"></div>
        <form id="profile-form" style="margin-top: 16px;">
          <div>
            <label for="profile-name">Jméno</label>
            <input id="profile-name" type="text" readonly />
          </div>
          <div>
            <label for="profile-email">Email</label>
            <input id="profile-email" type="email" readonly />
          </div>
          <div>
            <label for="profile-phone">Telefon</label>
            <input id="profile-phone" type="tel" readonly />
          </div>

          <div>
            <label for="profile-pass-input">Heslo</label>
            <div class="password-row">
              <input id="profile-pass-input" type="password" readonly />
              <button class="icon-btn" type="button" id="profile-pass-toggle" aria-label="Zobrazit heslo">
                <i class="bi bi-eye" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <div class="profile-actions">
            <button class="btn ghost" type="button" id="profile-edit">Editovat</button>
            <button class="btn ghost" type="button" id="profile-delete">Smazat profil</button>
            <button class="btn primary" type="submit" id="profile-save" disabled>Uložit</button>
            <button class="btn ghost" type="button" id="logout-btn">Odhlásit</button>
          </div>
          <div class="notice" id="profile-pass-notice" style="display:none;"></div>
        </form>
      </div>

      <div class="form-card" id="profile-messages" style="display:none;">
        <h2>Moje zprávy</h2>
        <div id="profile-messages-list"></div>
      </div>
    </section>


  </main>

  <div class="modal-backdrop" id="confirm-modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
      <h3 id="confirm-title">Potvrzení</h3>
      <p id="confirm-text"></p>
      <div class="modal-actions">
        <button class="btn ghost" type="button" id="confirm-cancel">Zrušit</button>
        <button class="btn primary" type="button" id="confirm-ok">Pokračovat</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <span>Svobodné cechy</span>
    <span>Učednictví pro generaci 12–18</span>
  </footer>

  <script src="app.js?v=202605051638"></script>
</body>

</html>
